<header
  class="app-header h-[60px] bg-white shadow-sm flex items-center justify-between px-4 border-b border-gray-200"
>
  <div class="flex items-center gap-2 w-1/4">
    <a routerLink="/" class="logo flex-shrink-0 mr-1">
      <img src="favicon.ico" alt="Logo" class="h-10 w-10" />
    </a>
    <div
      class="search-bar hidden xl:flex items-center bg-gray-100 rounded-full px-3 py-2 w-[260px]"
    >
      <i class="pi pi-search text-gray-500 mr-2 text-sm"></i>
      <input
        type="text"
        placeholder="Search"
        (keyup.enter)="onSearch($event)"
        class="bg-transparent text-[15px] outline-none flex-1 text-black placeholder-gray-500"
      />
    </div>
  </div>

  <nav class="main-nav hidden md:flex flex-1 justify-center items-center h-full gap-2">
    
    <a
      routerLink="/"
      routerLinkActive="border-blue-600"
      [routerLinkActiveOptions]="{ exact: true }"
      #rlaHome="routerLinkActive" 
      class="h-full flex items-center justify-center px-1 border-b-[3px] border-transparent cursor-pointer"
      pTooltip="Home"
      tooltipPosition="bottom"
    >
      <div
        class="flex items-center justify-center w-[60px] lg:w-[80px] h-[50px] rounded-lg transition-colors"
        [ngClass]="rlaHome.isActive ? 'bg-blue-100 text-blue-600' : 'text-gray-500 hover:bg-gray-100'"
      >
        <i class="pi pi-home text-[26px]"></i>
      </div>
    </a>

    @if (authService.isAdmin()) {
      <a
        routerLink="/admin"
        routerLinkActive="border-blue-600"
        #rlaAdmin="routerLinkActive"
        class="h-full flex items-center justify-center px-1 border-b-[3px] border-transparent cursor-pointer"
        pTooltip="Admin"
        tooltipPosition="bottom"
      >
        <div
          class="flex items-center justify-center w-[60px] lg:w-[80px] h-[50px] rounded-lg transition-colors"
          [ngClass]="rlaAdmin.isActive ? 'bg-blue-100 text-blue-600' : 'text-gray-500 hover:bg-gray-100'"
        >
          <i class="pi pi-cog text-[26px]"></i>
        </div>
      </a>
    }

    <a
      routerLink="/network"
      routerLinkActive="border-blue-600"
      #rlaNetwork="routerLinkActive"
      class="h-full flex items-center justify-center px-1 border-b-[3px] border-transparent cursor-pointer"
      pTooltip="Network"
      tooltipPosition="bottom"
    >
      <div
        class="flex items-center justify-center w-[60px] lg:w-[80px] h-[50px] rounded-lg transition-colors"
        [ngClass]="rlaNetwork.isActive ? 'bg-blue-100 text-blue-600' : 'text-gray-500 hover:bg-gray-100'"
      >
        <i class="pi pi-users text-[26px]"></i>
      </div>
    </a>

    <a
      routerLink="/jobs"
      routerLinkActive="border-blue-600"
      #rlaJobs="routerLinkActive"
      class="h-full flex items-center justify-center px-1 border-b-[3px] border-transparent cursor-pointer"
      pTooltip="Jobs"
      tooltipPosition="bottom"
    >
      <div
        class="flex items-center justify-center w-[60px] lg:w-[80px] h-[50px] rounded-lg transition-colors"
        [ngClass]="rlaJobs.isActive ? 'bg-blue-100 text-blue-600' : 'text-gray-500 hover:bg-gray-100'"
      >
        <i class="pi pi-briefcase text-[26px]"></i>
      </div>
    </a>

    <a
      routerLink="/cv-template"
      routerLinkActive="border-blue-600"
      #rlaCv="routerLinkActive"
      class="h-full flex items-center justify-center px-1 border-b-[3px] border-transparent cursor-pointer"
      pTooltip="Create CV"
      tooltipPosition="bottom"
    >
      <div
        class="flex items-center justify-center w-[60px] lg:w-[80px] h-[50px] rounded-lg transition-colors"
        [ngClass]="rlaCv.isActive ? 'bg-blue-100 text-blue-600' : 'text-gray-500 hover:bg-gray-100'"
      >
        <i class="pi pi-id-card text-[26px]"></i>
      </div>
    </a>

  </nav>

  <div class="flex items-center justify-end w-1/4 gap-2.5">
    <button
      class="w-11 h-11 rounded-full bg-gray-200 flex items-center justify-center hover:bg-gray-300 transition-colors text-black relative"
      (click)="chatDropdown.toggle($event)"
      pTooltip="Messages"
      tooltipPosition="bottom"
    >
      <i class="pi pi-comments text-xl"></i>
      @if ((totalUnreadCount$ | async); as unreadCount) {
        <span class="absolute -top-1 -right-1 bg-red-500 text-white text-[11px] font-bold px-1.5 py-0.5 rounded-full border-2 border-white">
          {{ unreadCount > 99 ? '99+' : unreadCount }}
        </span>
      }
    </button>

    <button class="w-11 h-11 rounded-full bg-gray-200 flex items-center justify-center hover:bg-gray-300 transition-colors text-black relative" (click)="notifDropdown.toggle($event)">
      <i class="pi pi-bell text-xl"></i>
      
      @if (notificationService.unreadCount$ | async; as unread) {
        <span class="absolute -top-1 -right-1 bg-red-500 text-white text-[11px] font-bold px-1.5 py-0.5 rounded-full border-2 border-white z-10 shadow-sm">
          {{ unread > 5 ? '5+' : unread }}
        </span>
      }
    </button>

    <div class="user-menu ml-1">
      <p-tieredMenu
        #userMenuPopup
        [model]="userMenuItems"
        [popup]="true"
      ></p-tieredMenu>
      <button
        class="w-11 h-11 rounded-full flex items-center justify-center hover:brightness-95 transition-all p-0 border-none cursor-pointer overflow-hidden"
        (click)="userMenuPopup.toggle($event)"
      >
        <p-avatar
          [image]="currentUser?.avatarUrl || 'assets/images/user-default.jpg'"
          shape="circle"
          [style]="{ width: '80%', height: '80%', 'display': 'flex', 'justify-content': 'center', 'align-items': 'center' }"
          styleClass="object-cover"
        ></p-avatar>
      </button>
    </div>
  </div>
</header>

<app-chat-overlay 
  #chatDropdown 
  [conversations$]="conversations$"
  (chatSelected)="openFloatingChat($event.partnerCode, $event.partnerName, $event.partnerAvatar)">
</app-chat-overlay>

<app-notification-overlay 
  #notifDropdown>
</app-notification-overlay>

@if (isFloatingChatOpen) {
  <app-floating-chat 
    [partner]="activeChatPartner" 
    (closeChat)="closeFloatingChat()"
    (onStartCall)="onStartCall($event)">
  </app-floating-chat>
}

@if (incomingCallData) {
  <div class="fixed inset-0 bg-black/70 z-[10000] flex items-center justify-center backdrop-blur-sm">
    <div class="bg-white rounded-2xl p-8 flex flex-col items-center w-[320px] shadow-2xl animate-bounce">
      <div class="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mb-4 text-3xl">
        <i class="pi pi-user"></i>
      </div>
      <h3 class="text-xl font-bold text-black text-center">{{ incomingCallData.callerName }}</h3>
      <p class="text-gray-500 mb-6 mt-1 text-sm">
        Incoming {{ incomingCallData.isVideoCall ? 'video' : 'audio' }} call...
      </p>
      
      <div class="flex gap-4 w-full">
        <button (click)="declineCall()" class="flex-1 bg-red-500 hover:bg-red-600 text-white py-2.5 rounded-full font-bold transition-colors flex items-center justify-center gap-2">
          <i class="pi pi-phone" style="transform: rotate(135deg);"></i> Decline
        </button>
        <button (click)="acceptCall()" class="flex-1 bg-green-500 hover:bg-green-600 text-white py-2.5 rounded-full font-bold transition-colors flex items-center justify-center gap-2">
          <i class="pi pi-video"></i> Answer
        </button>
      </div>
    </div>
  </div>
}

@if (activeCallRoomId) {
  <div class="fixed inset-0 z-[9999] bg-black">
    <app-video-call
      [roomId]="activeCallRoomId"
      [isCaller]="true"
      [isVideoCall]="activeCallType === 'VIDEO'"
      (onCallEnded)="handleCallEnded()"> 
    </app-video-call>
  </div>
}

@if (isLoggingOut) {
  <div class="fixed inset-0 bg-white/80 z-[100000] flex flex-col items-center justify-center backdrop-blur-md transition-all duration-500">
    <i class="pi pi-spin pi-spinner text-blue-600 text-6xl mb-6 shadow-sm rounded-full"></i>
    <h2 class="text-3xl font-bold text-gray-800 animate-pulse tracking-wide">Logging out...</h2>
    <p class="text-gray-500 mt-3 font-medium text-lg">Safely clearing your session</p>
  </div>
}
