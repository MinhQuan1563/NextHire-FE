<div class="grid grid-cols-1 md:grid-cols-4 gap-6">
    <div class="col-span-1">
        <app-info-sidebar></app-info-sidebar>
    </div>

    <div class="col-span-1 md:col-span-3 space-y-4">
        <div class="bg-white rounded-lg shadow p-4 flex items-center mb-2">
            <h1 class="text-[17px] font-bold text-gray-800 flex items-center gap-2 m-0">
                <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center">
                    <i class="pi pi-search text-blue-600 text-lg"></i>
                </div>
                Search Jobs
            </h1>
        </div>

        <form [formGroup]="searchForm" (ngSubmit)="performSearch()" class="search-section bg-white rounded-lg shadow p-4 mb-4 flex flex-col md:flex-row gap-2 items-start">

            <app-input-field
                label="" placeholder="Job title, skills or company"
                formControlName="query"
                class="flex-1 w-full"> </app-input-field>

            <app-input-field
                label=""
                placeholder="Location"
                formControlName="location"
                class="flex-1 w-full">
            </app-input-field>

            <button pButton label="Search" type="submit" class="p-button-primary"></button>
        </form>

        <div class="job-list grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="col-span-1 bg-white rounded-lg shadow p-4 hidden md:block">
                <h3 class="font-semibold mb-3">Filters</h3>
                <p class="text-sm text-gray-500">Filter options here...</p>
            </div>

            <div class="col-span-1 md:col-span-2 space-y-3">
                <h3 class="font-semibold mb-3">Suggested Jobs</h3>
                <div *ngFor="let job of jobs" class="job-item bg-white rounded-lg shadow p-4 border border-gray-200 hover:shadow-md transition">
                    <h4 class="text-blue-600 font-semibold text-lg">{{ job.title }}</h4>
                    <p class="text-sm text-gray-700">{{ job.companyName }}</p>
                    <p class="text-sm text-gray-500">{{ job.location }}</p>
                    <div class="mt-2">
                    <span *ngFor="let tag of job.tags" class="text-xs bg-gray-200 text-gray-700 rounded px-2 py-1 mr-1">{{ tag }}</span>
                    </div>
                    <p class="text-xs text-gray-400 mt-2">Posted {{ job.postedDate | date:'dd/MM/yyyy' }}</p>
                </div>
            </div>
        </div>
    </div>
</div>
