<div class="flex flex-col h-full bg-white">
  <div class="flex flex-col items-center p-6 border-b border-gray-100">
    <img [src]="partner.avatarUrl || 'assets/images/user-default.jpg'" class="w-[80px] h-[80px] rounded-full object-cover mb-3">
    <h3 class="text-xl font-bold text-black text-center">{{ partner.fullName }}</h3>
    <p class="text-[13px] text-gray-500 mt-1">Candidate Profile (Pr)</p>
    
    <div class="flex gap-6 mt-4">
      <div class="flex flex-col items-center cursor-pointer group">
        <div class="w-9 h-9 bg-gray-100 group-hover:bg-gray-200 rounded-full flex items-center justify-center text-black mb-1 transition-colors"><i class="pi pi-user"></i></div>
        <span class="text-[12px] text-gray-600">Profile</span>
      </div>
      <div class="flex flex-col items-center cursor-pointer group">
        <div class="w-9 h-9 bg-gray-100 group-hover:bg-gray-200 rounded-full flex items-center justify-center text-black mb-1 transition-colors"><i class="pi pi-bell-slash"></i></div>
        <span class="text-[12px] text-gray-600">Mute</span>
      </div>
      <div class="flex flex-col items-center cursor-pointer group">
        <div class="w-9 h-9 bg-gray-100 group-hover:bg-gray-200 rounded-full flex items-center justify-center text-black mb-1 transition-colors"><i class="pi pi-search"></i></div>
        <span class="text-[12px] text-gray-600">Search</span>
      </div>
    </div>
  </div>

  <div class="flex-1 overflow-y-auto p-2">
    <div class="p-3 hover:bg-gray-50 rounded-lg cursor-pointer flex justify-between items-center font-semibold text-black">
      Chat Info <i class="pi pi-chevron-down text-sm text-gray-500"></i>
    </div>
    <div class="p-3 hover:bg-gray-50 rounded-lg cursor-pointer flex justify-between items-center font-semibold text-black">
      Customize Chat <i class="pi pi-chevron-down text-sm text-gray-500"></i>
    </div>
    <div class="p-3 hover:bg-gray-50 rounded-lg cursor-pointer flex justify-between items-center font-semibold text-black">
      Media, Files and Links <i class="pi pi-chevron-down text-sm text-gray-500"></i>
    </div>
    <div class="p-3 hover:bg-gray-50 rounded-lg cursor-pointer flex justify-between items-center font-semibold text-black">
      Privacy & Support <i class="pi pi-chevron-down text-sm text-gray-500"></i>
    </div>
  </div>
</div>
