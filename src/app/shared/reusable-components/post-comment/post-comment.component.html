<div class="flex flex-col h-[65vh] md:h-[70vh]">

  <div class="flex-1 overflow-y-auto p-4 custom-scrollbar bg-white">
    
    <div *ngIf="isLoading && comments.length === 0" class="text-center py-4">
      <i class="pi pi-spin pi-spinner text-primary text-xl"></i>
    </div>

    <div class="space-y-4">
      <div *ngFor="let comment of comments" class="comment-item flex gap-3">
        <p-avatar 
          [label]="comment.userCode.charAt(0).toUpperCase()" 
          shape="circle" 
          styleClass="bg-blue-500 text-white font-bold flex-shrink-0 w-8 h-8 md:w-10 md:h-10">
        </p-avatar>

        <div class="flex-1 min-w-0">
          <div class="bg-gray-100 rounded-2xl px-4 py-2 inline-block max-w-full">
            <a href="#" class="font-bold text-sm text-gray-900 hover:underline block mb-0.5">
              {{ comment.userCode }}
            </a>
            <span class="text-sm text-gray-800 whitespace-pre-wrap break-words leading-snug">
              {{ comment.content }}
            </span>
          </div>

          <div class="flex items-center gap-4 mt-1 ml-2 text-xs text-gray-500 font-medium">
            <span>{{ comment.createAt | date:'dd/MM HH:mm' }}</span>
            <button class="hover:text-gray-900 cursor-pointer font-bold">Thích</button>
            <button class="hover:text-gray-900 cursor-pointer font-bold" (click)="startReply(comment.commentId)">
              Trả lời
            </button>
            <button *ngIf="comment.userCode === currentUserCode" 
                    class="hover:text-red-600 cursor-pointer" 
                    (click)="deleteComment(comment.commentId)">
              Xóa
            </button>
            <span *ngIf="comment.childCommentCount > 0" class="text-gray-600">
               {{ comment.childCommentCount }} phản hồi
            </span>
          </div>

          <div *ngIf="replyingTo === comment.commentId" class="mt-3 flex gap-2 animate-fade-in items-start">
             <p-avatar icon="pi pi-user" shape="circle" styleClass="w-6 h-6 bg-gray-200 text-gray-500"></p-avatar>
             <div class="flex-1">
                <textarea 
                  pInputTextarea 
                  [(ngModel)]="replyContent" 
                  [autoResize]="true" 
                  rows="1"
                  class="w-full text-sm bg-gray-50 border-gray-300 rounded-xl px-3 py-2 focus:ring-0 focus:border-blue-500"
                  placeholder="Viết câu trả lời...">
                </textarea>
                <div class="flex justify-end gap-2 mt-2">
                   <span class="text-xs text-blue-500 cursor-pointer py-1 px-2 hover:bg-blue-50 rounded" (click)="cancelReply()">Hủy</span>
                   <button class="text-xs bg-blue-500 text-white py-1 px-3 rounded-full font-bold hover:bg-blue-600 disabled:opacity-50" 
                           [disabled]="!replyContent.trim()" 
                           (click)="replyComment(comment.commentId)">
                      Gửi
                   </button>
                </div>
             </div>
          </div>

        </div>
      </div>
    </div>

    <div *ngIf="hasMore && !isLoading && comments.length > 0" class="py-4 text-center">
      <button (click)="loadMore()" class="text-sm font-bold text-gray-600 hover:text-gray-900 hover:underline">
        Xem thêm bình luận cũ hơn
      </button>
    </div>
    
    <div *ngIf="isLoading && comments.length > 0" class="text-center py-2">
       <i class="pi pi-spin pi-spinner text-gray-400"></i>
    </div>
  </div>

  <div class="px-3 py-2 bg-white border-gray-200 z-10 sticky bottom-0">
    <app-input-rich-control
      placeholder="Viết bình luận ..."
      [userChar]="currentUserCode.charAt(0).toUpperCase()"
      (onSend)="onCommentSubmit($event)">
    </app-input-rich-control>
  </div>

</div>
