@if (canViewPost) {
  <div class="post-card bg-white rounded-lg shadow overflow-hidden mb-4">
    <div class="p-4">
      <div class="flex items-start mb-3">
        <div class="mr-3 flex-shrink-0">
          <p-avatar
            [image]="postAuthor?.avatarUrl || undefined"
            [label]="!postAuthor?.avatarUrl ? (postAuthor?.fullName || post.userCode).charAt(0).toUpperCase() : ''"
            size="large"
            shape="circle">
          </p-avatar>
        </div>
        <div class="flex-1">
          <div class="flex items-center justify-between">
            <div>
              <a href="#" class="font-semibold text-sm text-gray-800 hover:underline">{{ postAuthor?.fullName || 'Anonymous user' }}</a>
              <p class="text-xs text-gray-500 flex items-center">
                {{ post.createdAt | date:'MMMM d, yyyy' }} 
                @if (post.privacy === 1) {
                  <i class="pi pi-globe ml-2" pTooltip="Public" tooltipPosition="top"></i>
                }
                @if (post.privacy === 2) {
                  <i class="pi pi-users ml-2" pTooltip="Friends" tooltipPosition="top"></i>
                }
              </p>
            </div>
            <div class="ml-auto">
              <p-menu #postMenu [model]="postMenuItems" [popup]="true" appendTo="body" styleClass="w-48 shadow-xl rounded-xl"></p-menu>
              <button pButton type="button" icon="pi pi-ellipsis-h"
                      (click)="showPostMenu(postMenu, $event, post.postCode)"
                      class="p-button-rounded p-button-text p-button-sm text-gray-500">
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="post-content text-sm text-gray-700 mb-3" [innerHTML]="post.content || ''">
      </div>
    </div>
    
    <div *ngIf="getFirstImageUrl()" class="post-image-container">
      <img [src]="getFirstImageUrl()" alt="Post image" class="w-full h-auto max-h-96 object-contain">
    </div>

    <div class="px-4 py-2 flex justify-between items-center text-xs text-gray-500 border-b border-gray-100" 
         *ngIf="post.likeCount > 0 || post.commentCount > 0">
      
      <span class="hover:underline cursor-pointer" *ngIf="post.likeCount > 0" (click)="showLikes = true">
        <i class="pi pi-thumbs-up text-blue-500 mr-1"></i> {{ post.likeCount }} likes
      </span>
      
      <span class="hover:underline cursor-pointer" *ngIf="post.commentCount > 0" (click)="showComments = true">
        {{ post.commentCount }} comments
      </span>
    </div>

    <div>
      <app-post-actions 
        [postId]="post.postCode" 
        [likeCount]="post.likeCount"
        (likeUpdated)="onLikeUpdated($event)">
      </app-post-actions>

      <p-dialog 
        [(visible)]="showComments" 
        [modal]="true" 
        [draggable]="false" 
        [resizable]="false"
        [dismissableMask]="true"
        header="Comments"
        [style]="{ width: '700px', height: '665px', 'max-width': '95vw', 'max-height': '80vh' }"
        styleClass="custom-dialog">
        
        @if (showComments) {
          <div class="pt-2">
            <app-post-comments [postCode]="post.postCode"></app-post-comments>
          </div>
        }
      </p-dialog>

      <p-dialog 
        [(visible)]="showLikes" 
        [modal]="true" 
        [draggable]="false" 
        [resizable]="false"
        [dismissableMask]="true"
        header="Likes"
        [style]="{ width: '548px', height: '440px', 'max-width': '95vw', 'max-height': '90vh' }"
        styleClass="custom-like-dialog">
        
        @if (showLikes) {
          <div class="pt-2">
            <app-post-like [postCode]="post.postCode"></app-post-like>
          </div>
        }
      </p-dialog>

    </div>
  </div>
}
