<div class="flex flex-col h-[65vh] md:h-[70vh]">

  <div class="flex-1 overflow-y-auto p-4 mb-4 custom-scrollbar bg-white">
    
    <div *ngIf="isLoading && comments.length === 0" class="text-center py-4">
      <i class="pi pi-spin pi-spinner text-primary text-xl"></i>
    </div>

    <!-- Comments List -->
    <div class="space-y-2">
      <div *ngFor="let comment of comments" class="comment-item flex gap-2 md:gap-3">
        
        <p-avatar 
          [label]="comment.userCode.charAt(0).toUpperCase()" 
          shape="circle" 
          styleClass="bg-blue-500 text-white font-bold flex-shrink-0 w-10 h-10">
        </p-avatar>

        <div class="flex-1 min-w-0">
          
          <div class="bg-gray-100 rounded-2xl px-4 py-2 inline-block max-w-full shadow-sm">
            <a href="#" class="font-bold text-[13px] text-gray-900 hover:underline block mb-0.5">
              {{ comment.userCode }}
            </a>
            <div class="text-[14px] text-gray-800 whitespace-pre-wrap break-words leading-snug">
              {{ comment.content }}
            </div>
          </div>

          <div class="flex items-center gap-3 mt-1 ml-3 text-[12px] text-gray-500 font-bold">
            <span class="font-normal">{{ getVnTime(comment.createAt) | date:'dd/MM/YYYY' }}</span>
            <button class="hover:underline hover:text-gray-800">Like</button>
            <button class="hover:underline hover:text-gray-800" (click)="startReply(comment.commentId)">Reply</button>
            <button *ngIf="comment.userCode === currentUserCode" 
                    class="hover:underline hover:text-red-600" 
                    (click)="confirmDelete(comment.commentId)"> 
                    Delete
            </button>
          </div>

          <div class="mt-2">
            
            <button *ngIf="comment.childCommentCount > 0 && !comment.repliesLoaded" 
                    (click)="loadReplies(comment)"
                    class="flex items-center gap-2 text-[13px] font-semibold text-gray-500 hover:text-gray-800 hover:underline ml-3 mb-2 transition-colors">
              View {{ comment.childCommentCount }} replies
            </button>

            <div *ngIf="comment.replies && comment.replies.length > 0" class="mt-3 space-y-3">
              <div *ngFor="let reply of comment.replies" class="flex gap-2">
                
                <p-avatar 
                  [label]="reply.userCode.charAt(0).toUpperCase()" 
                  shape="circle" 
                  styleClass="bg-green-500 text-white font-bold flex-shrink-0 w-8 h-8 mt-1">
                </p-avatar>

                <div class="flex-1 min-w-0">
                  <div class="bg-gray-100 rounded-2xl px-4 py-2 inline-block max-w-full shadow-sm">
                    <a href="#" class="font-bold text-[13px] text-gray-900 hover:underline block mb-0.5">
                      {{ reply.userCode }}
                    </a>
                    <div class="text-[14px] text-gray-800 whitespace-pre-wrap break-words leading-snug">
                      {{ reply.content }}
                    </div>
                  </div>

                  <div class="flex items-center gap-3 mt-1 ml-3 text-[12px] text-gray-500 font-bold">
                    <span class="font-normal">{{ getVnTime(reply.createAt) | date:'dd/MM/YYYY' }}</span>
                    <button class="hover:underline hover:text-gray-800">Like</button>
                    <button *ngIf="reply.userCode === currentUserCode" 
                            class="hover:underline hover:text-red-600" 
                            (click)="confirmDelete(reply.commentId)">
                            Delete
                    </button>
                  </div>
                </div>

              </div>
            </div>
          </div>

          <div *ngIf="replyingTo === comment.commentId" class="mt-3 flex gap-2 animate-fade-in items-start">
            <p-avatar 
              [label]="currentUserCode.charAt(0).toUpperCase()" 
              shape="circle" 
              styleClass="bg-blue-600 text-white font-bold flex-shrink-0 w-8 h-8 mt-1">
            </p-avatar>
            
            <div class="flex-1">
              <textarea 
                pInputTextarea 
                [(ngModel)]="replyContent" 
                [autoResize]="true" 
                rows="1"
                class="w-full text-[14px] bg-white border border-gray-300 rounded-2xl px-4 py-2.5 focus:ring-2 focus:ring-blue-100 focus:border-blue-500 transition-all shadow-sm"
                placeholder="Write a reply...">
              </textarea>
              
              <div class="flex justify-end items-center gap-2 mt-2">
                <button class="text-[13px] text-gray-500 font-semibold cursor-pointer py-1.5 px-3 hover:bg-gray-100 rounded-full transition-colors" 
                        (click)="cancelReply()">
                  Cancel
                </button>
                <button class="text-[13px] bg-blue-600 text-white py-1.5 px-4 rounded-full font-bold hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed shadow-sm" 
                        [disabled]="!replyContent.trim()" 
                        (click)="replyComment(comment.commentId)">
                  Reply
                </button>
              </div>
            </div>
          </div>
          </div> </div>
    </div>

    <div *ngIf="hasMore && !isLoading && comments.length > 0" class="py-4 text-center">
      <button (click)="loadMore()" class="text-sm font-bold text-gray-600 hover:text-gray-900 hover:underline">
        View older comments
      </button>
    </div>
    
    <div *ngIf="isLoading && comments.length > 0" class="text-center py-2">
       <i class="pi pi-spin pi-spinner text-gray-400"></i>
    </div>
  </div>

  <div class="px-3 py-2 bg-white border-gray-200 z-10 sticky bottom-0">
    <app-input-rich-control
      placeholder="Write a comment..."
      [userChar]="currentUserCode.charAt(0).toUpperCase()"
      (onSend)="onCommentSubmit($event)">
    </app-input-rich-control>
  </div>

</div>
