<div class="min-h-[80vh] flex items-center justify-center p-4">
  <div class="max-w-lg w-full bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-100 p-8 md:p-12 text-center transform transition-all hover:-translate-y-1 hover:shadow-[0_8px_30px_rgb(0,0,0,0.08)]">
    
    <div class="relative w-28 h-28 mx-auto mb-8 flex items-center justify-center">
      <div class="absolute inset-0 bg-red-50 rounded-full animate-pulse"></div>
      <div class="absolute inset-2 bg-red-100 rounded-full"></div>
      
      <i class="pi pi-lock text-5xl text-red-500 relative z-10 lock-animation" *ngIf="errorCode === '403'"></i>
      <i class="pi pi-exclamation-triangle text-5xl text-orange-500 relative z-10 warning-animation" *ngIf="errorCode !== '403'"></i>
    </div>
    
    <h1 class="text-7xl font-black text-gray-900 tracking-tighter mb-2 font-mono">
      {{ errorCode }}
    </h1>
    
    <h2 class="text-2xl md:text-3xl font-bold text-gray-800 mb-4">
      {{ title }}
    </h2>
    
    <p class="text-gray-500 text-base md:text-lg mb-8 leading-relaxed px-4">
      {{ message }}
    </p>

    <div class="actions" *ngIf="showButton">
      <p-button 
        [label]="buttonLabel" 
        icon="pi pi-home" 
        severity="secondary"
        [rounded]="true"
        [outlined]="true"
        size="large"
        (onClick)="handleAction()">
      </p-button>
    </div>

  </div>
</div>
